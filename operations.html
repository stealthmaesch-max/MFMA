<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0d12"><title>MFMA Operations Display</title><link rel="stylesheet" href="styles.css?v=44"></head>
<body class="control-page fan-page"><main class="control-shell">
<header class="topbar"><div class="brand-row"><div class="mark small">MFMA</div><div><p class="eyebrow">Safety Operations</p><h1>Operations Display</h1></div></div><div id="ops-connection" class="pill"><span class="dot"></span><span>Connecting</span></div></header>
<section class="fan-hero panel"><div><p class="eyebrow">Event</p><h2 id="ops-event">No Active Event</h2><p id="ops-state">Waiting for Race Control.</p></div></section>
<section id="ops-timer-panel" class="timer-panel hidden"><div><p class="eyebrow">Current Session</p><div id="ops-phase" class="phase"></div></div><div id="ops-timer" class="timer">--:--</div><div class="timer-side"><span id="ops-session"></span><span id="ops-roles"></span></div></section>
<section id="ops-special" class="panel hidden"><p class="eyebrow">Operational State</p><h2 id="ops-special-title"></h2><p id="ops-special-detail"></p></section>
<section id="ops-score-panel" class="panel hidden"><div class="section-head compact"><div><p class="eyebrow">Results</p><h2>Session Victories</h2></div></div><div id="ops-scoreboard" class="scoreboard"></div></section>
<section id="ops-circuit-panel" class="panel hidden"><div class="section-head compact"><div><p class="eyebrow">Circuit</p><h2>Role Progress</h2></div></div><div id="ops-circuit" class="circuit-progress"></div></section>
<section id="ops-assignments-panel" class="panel hidden"><div class="section-head compact"><div><p class="eyebrow">On Course</p><h2>Teams and Participants</h2></div></div><div id="ops-assignments" class="assignment-grid"></div></section>
</main><script type="module" src="operations.js?v=44"></script></body></html>
