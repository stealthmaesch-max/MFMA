<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0d12">
<title>MFMA Fan Watch</title>
<link rel="stylesheet" href="styles.css?v=38">
</head>
<body class="control-page fan-page">
<main class="control-shell">
<header class="topbar">
<div class="brand-row"><div class="mark small">MFMA</div><div><p class="eyebrow">Live Spectator View</p><h1>Fan Watch</h1></div></div>
<div id="fan-connection" class="pill"><span class="dot"></span><span>Connecting</span></div>
</header>

<section class="fan-hero panel">
<div><p class="eyebrow">Event</p><h2 id="fan-event">No Active Event</h2><p id="fan-state">Waiting for Race Control.</p></div>
<div id="fan-flag" class="fan-flag-badge">STANDBY</div>
</section>

<section class="timer-panel">
<div><p class="eyebrow">Current Session</p><div id="fan-phase" class="phase">STANDBY</div></div>
<div id="fan-timer" class="timer">--:--</div>
<div class="timer-side"><span id="fan-session"></span><span id="fan-roles"></span></div>
</section>

<section class="panel">
<div class="section-head compact"><div><p class="eyebrow">Leaderboard</p><h2>Session Victories</h2></div></div>
<div id="fan-scoreboard" class="scoreboard"></div>
</section>

<section class="panel">
<div class="section-head compact"><div><p class="eyebrow">Circuit</p><h2>Role Progress</h2></div></div>
<div id="fan-circuit" class="circuit-progress"></div>
</section>

<section class="panel">
<div class="section-head compact"><div><p class="eyebrow">On Course</p><h2>Teams and Participants</h2></div></div>
<div id="fan-assignments" class="assignment-grid"></div>
</section>
</main>
<script type="module" src="fan.js?v=38"></script>
</body>
</html>
