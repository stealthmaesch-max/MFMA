<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0d1117"><meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><title>MFMA Flag Display</title>
<link rel="stylesheet" href="styles.css?v=47"></head>
<body class="display-body"><section id="display" class="display flag-clear">
<div class="display-top"><div class="display-brand">MFMA</div><div class="display-tools"><button id="display-sound" class="display-sound" type="button">Enable Sound</button><div id="display-status" class="display-status"><span class="dot"></span><span>Connecting</span></div></div></div>
<div id="status-view" class="status-view"><div id="status-kicker" class="status-kicker">MFMA DIGITAL FLAG NETWORK</div><div id="status-title" class="status-title">NO ACTIVE EVENT</div><div id="status-detail" class="status-detail">Race Control has not opened an event.</div><div id="standby-leaderboard" class="driver-leaderboard hidden"></div></div>
<div id="live-view" class="live-view hidden"><div id="display-session" class="display-session"></div><div id="display-timer" class="display-timer">00:00</div><div id="label" class="signal-label">MFMA</div><div id="instruction" class="signal-instruction">STANDBY</div></div>
<div class="display-footer"><span>DIGITAL FLAG NETWORK</span><span>MFMA SAFETY OPERATIONS</span></div>
</section><script type="module" src="display.js?v=45"></script></body></html>
